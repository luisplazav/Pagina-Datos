<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Un fetch</title>
        <style>
            body {
                font-family: Helvetica, Arial, sans-serif;
				color: black;
            }
			table {
			border-collapse: collapse; 
			text-align: left;
			}
			td, th{
			border: 1px solid blue; 
			padding: 1rem;
			}
        </style>
    </head>
    <body>
        <h1>Mis electivos</h1>
		<table>
		<thead>
		<tr>
		<th>Asignatura</th>
		<th>Grupo</th>
		<th>Enfoque</th>
		</tr>
		</thead>
		</table>
		<tbody></tbody>
        <ol id="estudiantes"></ol>

        <script>
		const t = document.querySelector("table");
            const URL = "https://api.myjson.online/v1/records/f11e506a-bf97-47a2-b542-e88fe42b8d1b";
fetch(URL)
    .then((respuesta) => {
        if (!respuesta.ok) {
            throw new Error("Error HTTP: " + respuesta.status);
        }
        return respuesta.json();
    })
    .then((datos) => {
        var trabajo = datos.data;
        console.log("Datos recibidos:", trabajo);
        trabajo.forEach((x) => {
            if (x.ok == 1){
                t.innerHTML += `<tr><td>${x.name}</td><td>${x.group}</td><td>${x.focus} ;
				</td></tr>`;
            }
        });
    })
    .catch((error) => {
        console.error("Algo salió mal:", error);
    });
        </script>
    </body>
</html>
